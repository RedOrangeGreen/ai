<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View script</title>
</head>
<body>
  <h2 id="title"></h2>
  <pre id="code"></pre>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file') || '';

    // Add every file you want to be viewable here
    const allowed = ['setup.sh', 'run.sh', 'kilo-prompt.txt', 
                     'kilopig/main.py', 'kilopig/highscore.xml', 'kilopig/files.txt', 
                     '../opencode/tetris/webpage/index.html', '../opencode/tetris/webpage/script.js', '../opencode/tetris/webpage/styles.css', 
                     '../opencode/setup.sh', '../opencode/run.sh', '../opencode/tetris/vibes.txt', '../opencode/tetris/opencode-prompt.txt', '../opencode/tetris/vibes-next.txt',
                     '../opencode/tetris/webpage-next/index.html', '../opencode/tetris/webpage-next/script.js', '../opencode/tetris/webpage-next/styles.css'];

    if (!allowed.includes(file)) {
      document.getElementById('title').textContent = 'Invalid file';
    } else {
      document.getElementById('title').textContent = file;

      // view.html is already in kilocli/, so this points to kilocli/setup.sh etc.
      fetch(file)
        .then(r => r.text())
        .then(text => {
          document.getElementById('code').textContent = text;
        })
        .catch(() => {
          document.getElementById('title').textContent = 'Error loading file';
        });
    }
  </script>
</body>
</html>
